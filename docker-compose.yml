services:
  database:
    image: gvenzl/oracle-free:slim 
    container_name: inventory-db
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=123
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build: 
      context: ./backend-quarkus
      dockerfile: src/main/docker/Dockerfile.jvm 
    container_name: inventory-api
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:oracle:thin:@database:1521/FREEPDB1
      - QUARKUS_DATASOURCE_USERNAME=system
      - QUARKUS_DATASOURCE_PASSWORD=123
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build: ./frontend-react
    container_name: inventory-ui
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  oracle_data: 